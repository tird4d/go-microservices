apiVersion: v1
kind: Service
metadata:
  name: {{ include "email-service.fullname" . }}
  labels:
    {{- include "email-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 2112
      targetPort: 2112
      protocol: TCP
      name: metrics
  selector:
    {{- include "email-service.selectorLabels" . | nindent 4 }}
