name: Deploy RabbitMQ to EKS

on:
  push:
    branches: [main]
    paths:
      - 'infra/rabbitmq/**'
      - '.github/workflows/rabbitmq-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/rabbitmq/**'
      - '.github/workflows/rabbitmq-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # Step 3: (No ECR login — Bitnami RabbitMQ is a public image, no build needed)

      # Step 4: Set up Helm and add Bitnami repo
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      # Step 5: Validate values file against the Bitnami chart (runs on both push and pull_request)
      - name: Add Bitnami repo and lint values
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm lint infra/rabbitmq --generate-name 2>/dev/null || \
            helm template rabbitmq bitnami/rabbitmq -f infra/rabbitmq/values.yaml > /dev/null

      # Step 6–8: (No Docker build, Trivy scan, or ECR push — third-party image)

      # Step 9: Update kubeconfig
      - name: Update kubeconfig
        if: github.event_name == 'push'
        run: |
          aws eks update-kubeconfig \
            --region eu-central-1 \
            --name go-microservices

      # Step 10: Inject credentials from GitHub Actions Secrets at deploy time.
      # auth.password and auth.erlangCookie are NEVER stored in infra/rabbitmq/values.yaml.
      # Step 11: Ensure namespace exists
      - name: Create namespace if not exists
        if: github.event_name == 'push'
        run: |
          kubectl get namespace prod || kubectl create namespace prod

      # Step 12: Deploy with Helm (Bitnami chart + our values overrides)
      - name: Deploy with Helm
        if: github.event_name == 'push'
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm upgrade --install rabbitmq bitnami/rabbitmq \
            -f infra/rabbitmq/values.yaml \
            --set auth.password=${{ secrets.RABBITMQ_PASSWORD }} \
            --set auth.erlangCookie=${{ secrets.RABBITMQ_ERLANG_COOKIE }} \
            --namespace prod \
            --atomic \
            --timeout 5m

      # Step 13: Verify deployment
      - name: Verify deployment
        if: github.event_name == 'push'
        run: |
          kubectl rollout status statefulset/rabbitmq -n prod --timeout=5m
          kubectl get pods -n prod -l app.kubernetes.io/instance=rabbitmq
