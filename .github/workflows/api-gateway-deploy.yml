
name: Build and Deploy API Gateway to EKS

on:
  push:
    branches: [main]
    paths:
      - 'api_gateway/**'
      - 'charts/api-gateway/**'
      - '.github/workflows/api-gateway-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # Step 3: Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-central-1 | \
          docker login --username AWS --password-stdin 114851843413.dkr.ecr.eu-central-1.amazonaws.com

      # Step 4: Set up Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      # Step 5: Run tests
      - name: Run tests
        run: |
          cd api_gateway
          go test ./... -v -race -coverprofile=coverage.out
          go tool cover -func=coverage.out

      # Step 6: Build Docker image
      # so it can resolve replace directives for user_service, auth_service, product_service
      - name: Build Docker image
        run: |
          docker build -f api_gateway/Dockerfile \
            -t 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/api-gateway:${{ github.sha }} .
          docker tag \
            114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/api-gateway:${{ github.sha }} \
            114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/api-gateway:latest

      # Step 7: Push to ECR
      - name: Push to Amazon ECR
        run: |
          docker push 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/api-gateway:${{ github.sha }}
          docker push 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/api-gateway:latest

      # Step 8: Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region eu-central-1 \
            --name go-microservices

      # Step 9: Create namespace if not exists
      - name: Create namespace if not exists
        run: |
          kubectl get namespace prod || kubectl create namespace prod

      # Step 10: Deploy with Helm
      # api-gateway has no secrets — all config (gRPC addresses) is in values.yaml
      - name: Deploy with Helm
        run: |
          helm upgrade --install api-gateway ./charts/api-gateway \
            -f charts/api-gateway/values.yaml \
            --set image.tag=${{ github.sha }} \
            --namespace prod \
            --atomic \
            --timeout 5m

      # Step 11: Verify deployment
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n prod --timeout=5m
          kubectl get pods -n prod -l app.kubernetes.io/instance=api-gateway
