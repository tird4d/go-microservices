# kube-prometheus-stack Helm override values
# Apply with:
#   helm upgrade monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --reuse-values \
#     -f infra/monitoring/values.yaml

# ============================================================
# ALERT RULES
# Ported from prometheus/rules/alerts.yml (local docker-compose)
# ============================================================
additionalPrometheusRulesMap:
  microservices-rules:
    groups:
      - name: microservices
        rules:

          # Fires if Prometheus can't scrape a service for 1 minute
          # Uses `absent` to also catch when the target disappears entirely (pod deleted)
          - alert: ServiceDown
            expr: |
              up{namespace="prod"} == 0
              or absent(up{job="user-service", namespace="prod"})
              or absent(up{job="auth-service", namespace="prod"})
              or absent(up{job="product-service", namespace="prod"})
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is DOWN"
              description: "Prometheus cannot reach {{ $labels.job }} at {{ $labels.instance }}. Has been down for 1 minute."

          # Fires if p99 latency exceeds 500ms for 2 minutes
          - alert: HighLatencyP99
            expr: |
              histogram_quantile(0.99,
                rate(auth_service_request_duration_seconds_bucket[5m])
              ) > 0.5
              or
              histogram_quantile(0.99,
                rate(product_service_request_duration_seconds_bucket[5m])
              ) > 0.5
              or
              histogram_quantile(0.99,
                rate(user_service_request_duration_seconds_bucket[5m])
              ) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High p99 latency on {{ $labels.job }}"
              description: "p99 latency is above 500ms for 2 minutes. Value: {{ $value | humanizeDuration }}"

          # Fires if a pod has restarted more than 3 times in 15 minutes
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="prod"}[15m]) * 60 * 15 > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in 15 minutes."

# ============================================================
# ALERTMANAGER CONFIG
# ============================================================
alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: 'null'             # default: swallow (change to 'slack' when ready)
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: 'null'         # ← replace 'null' with 'slack' to enable Slack
        - match:
            severity: warning
          receiver: 'null'

    receivers:
      - name: 'null'               # alerts visible in AlertManager UI, nothing sent externally

      # ── Uncomment + fill in webhook URL to enable Slack ──
      # - name: 'slack'
      #   slack_configs:
      #     - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
      #       channel: '#alerts'
      #       send_resolved: true
      #       title: '{{ .GroupLabels.alertname }} — {{ .CommonLabels.severity }}'
      #       text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

    inhibit_rules:
      # Suppress latency warning when the service is already down (critical)
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['job']
