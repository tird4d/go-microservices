
name: Build and Deploy User Service to EKS

on:
  push:
    branches: [main]
    paths:
      - 'user_service/**'  # Only trigger if user_service code changed
      - 'charts/user-service/**'
      - '.github/workflows/user-service-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1
      
      # Step 3: Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-central-1 | \
          docker login --username AWS --password-stdin 114851843413.dkr.ecr.eu-central-1.amazonaws.com

      # Step 4: Set up Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      # Step 5: Run tests
      - name: Run tests
        run: |
          cd user_service
          go test ./... -v -race -coverprofile=coverage.out
          go tool cover -func=coverage.out

      # Step 6: Build Docker image
      - name: Build Docker image
        run: |
          docker build -f user_service/Dockerfile \
            -t 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/user-service:${{ github.sha }} .
          docker tag 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/user-service:${{ github.sha }} \
                     114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/user-service:latest
      
      # Step 7: Scan Docker image with Trivy
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/user-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Step 8: Push to ECR
      - name: Push to Amazon ECR
        run: |
          docker push 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/user-service:${{ github.sha }}
          docker push 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/user-service:latest
      
      # Step 9: Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region eu-central-1 \
            --name go-microservices
      
      # Step 10: Reconstruct secrets file from GitHub Actions Secrets
      # The secrets/ directory is gitignored - we build it on the fly here
      - name: Create secrets file
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          mkdir -p secrets
          cat <<EOF > secrets/user-service.values.prod.yaml
          secrets:
            mongoUri: "${MONGO_URI}"
          EOF

      # Step 11: Ensure namespace exists
      - name: Create namespace if not exists
        run: |
          kubectl get namespace prod || kubectl create namespace prod

      # Step 12: Deploy with Helm
      - name: Deploy with Helm
        run: |
          helm upgrade --install user-service ./charts/user-service \
            -f charts/user-service/values.yaml \
            -f secrets/user-service.values.prod.yaml \
            --set image.tag=${{ github.sha }} \
            --namespace prod \
            --atomic \
            --timeout 5m
      
      # Step 13: Verify deployment
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/user-service -n prod --timeout=5m
          kubectl get pods -n prod -l app.kubernetes.io/instance=user-service