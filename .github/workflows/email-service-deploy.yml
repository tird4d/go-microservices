name: Build and Deploy Email Service to EKS

on:
  push:
    branches: [main]
    paths:
      - 'email_service/**'
      - 'charts/email-service/**'
      - '.github/workflows/email-service-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'email_service/**'
      - 'charts/email-service/**'
      - '.github/workflows/email-service-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # Step 3: Login to ECR
      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        run: |
          aws ecr get-login-password --region eu-central-1 | \
          docker login --username AWS --password-stdin 114851843413.dkr.ecr.eu-central-1.amazonaws.com

      # Step 4: Set up Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      # Step 5: Run tests
      - name: Run tests
        run: |
          cd email_service
          go test ./... -v -race -coverprofile=coverage.out
          go tool cover -func=coverage.out

      # Step 6: Build Docker image
      - name: Build Docker image
        if: github.event_name == 'push'
        run: |
          docker build -f email_service/Dockerfile \
            -t 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/email-service:${{ github.sha }} .
          docker tag \
            114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/email-service:${{ github.sha }} \
            114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/email-service:latest

      # Step 7: Scan Docker image with Trivy
      - name: Scan Docker image with Trivy
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # trivy v0.69.3 (Mar 4 2026)
        with:
          image-ref: '114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/email-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Step 8: Push to ECR
      - name: Push to Amazon ECR
        if: github.event_name == 'push'
        run: |
          docker push 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/email-service:${{ github.sha }}
          docker push 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/email-service:latest

      # Step 9: Update kubeconfig
      - name: Update kubeconfig
        if: github.event_name == 'push'
        run: |
          aws eks update-kubeconfig \
            --region eu-central-1 \
            --name go-microservices

      # Step 10: Reconstruct secrets file from GitHub Actions Secrets
      # The secrets/ directory is gitignored - we build it on the fly here
      - name: Create secrets file
        if: github.event_name == 'push'
        env:
          RABBITMQ_CONNECTION_STRING: ${{ secrets.EMAIL_SERVICE_RABBITMQ_CONNECTION_STRING }}
        run: |
          mkdir -p secrets
          cat <<EOF > secrets/email-service.values.prod.yaml
          secrets:
            rabbitmqConnectionString: "${RABBITMQ_CONNECTION_STRING}"
          EOF

      # Step 11: Ensure namespace exists
      - name: Create namespace if not exists
        if: github.event_name == 'push'
        run: |
          kubectl get namespace prod || kubectl create namespace prod

      # Step 12: Deploy with Helm
      - name: Deploy with Helm
        if: github.event_name == 'push'
        run: |
          helm upgrade --install email-service ./charts/email-service \
            -f charts/email-service/values.yaml \
            -f secrets/email-service.values.prod.yaml \
            --set image.tag=${{ github.sha }} \
            --namespace prod \
            --atomic \
            --timeout 5m

      # Step 13: Verify deployment
      - name: Verify deployment
        if: github.event_name == 'push'
        run: |
          kubectl rollout status deployment/email-service -n prod --timeout=5m
          kubectl get pods -n prod -l app.kubernetes.io/instance=email-service
