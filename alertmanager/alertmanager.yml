global:
  # How long to wait before re-sending an alert that is still firing
  resolve_timeout: 5m

route:
  # Default receiver for all alerts
  receiver: 'local-log'

  # Group alerts by service so you get one notification per service, not per alert
  group_by: ['alertname', 'job']

  # Wait 30s to batch multiple alerts firing at the same time into one notification
  group_wait: 30s

  # Wait 5m before sending a repeat notification for the same firing alert
  group_interval: 5m
  repeat_interval: 1h

  # Route critical alerts to a separate receiver
  routes:
    - match:
        severity: critical
      receiver: 'local-log'
      # To send critical alerts to Slack instead, change receiver to 'slack'

receivers:
  # ============ LOCAL (no external setup needed) ============
  # Alerts are visible in AlertManager UI at http://localhost:9093
  # Nothing is sent externally — good for local development
  - name: 'local-log'

  # ============ SLACK (uncomment + add your webhook URL to use) ============
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
  #       channel: '#alerts'
  #       title: '{{ .GroupLabels.alertname }}'
  #       text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
  #       send_resolved: true

  # ============ EMAIL (uncomment + fill in SMTP details to use) ============
  # - name: 'email'
  #   email_configs:
  #     - to: 'your@email.com'
  #       from: 'alertmanager@yourdomain.com'
  #       smarthost: 'smtp.gmail.com:587'
  #       auth_username: 'your@email.com'
  #       auth_password: 'your-app-password'

inhibit_rules:
  # If a service is completely DOWN (critical), suppress the latency warning for that same service
  # No point alerting about slow responses if the service isn't responding at all
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['job']
