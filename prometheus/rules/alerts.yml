groups:
  - name: microservices
    rules:

      # ============ SERVICE DOWN ============
      # Fires if Prometheus can't scrape a service for 1 minute
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Prometheus cannot reach {{ $labels.job }} at {{ $labels.instance }}. Has been down for 1 minute."

      # ============ HIGH p99 LATENCY ============
      # Fires if 99% of requests take longer than 500ms (SLO breach)
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            rate(auth_service_request_duration_seconds_bucket[5m])
          ) > 0.5
          or
          histogram_quantile(0.99,
            rate(product_service_request_duration_seconds_bucket[5m])
          ) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency detected"
          description: "p99 latency is above 500ms for the last 2 minutes. Current value: {{ $value | humanizeDuration }}"

      # ============ HIGH ERROR RATE (future-proof) ============
      # Placeholder — requires error-labeled metrics to be added later
      # - alert: HighErrorRate
      #   expr: rate(auth_service_requests_total{status="error"}[5m]) > 0.05
