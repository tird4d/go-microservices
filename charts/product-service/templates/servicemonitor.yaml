apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "product-service.fullname" . }}
  namespace: monitoring          # must be in the monitoring namespace
  labels:
    release: monitoring          # CRITICAL — must match kube-prometheus-stack's selector
    {{- include "product-service.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - prod                     # namespace where your service pods run
  selector:
    matchLabels:
      {{- include "product-service.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics              # matches the named port in service.yaml
      path: /metrics
      interval: 15s
