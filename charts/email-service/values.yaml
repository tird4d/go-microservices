replicaCount: 1

image:
  repository: 114851843413.dkr.ecr.eu-central-1.amazonaws.com/go-microservice/email-service
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

secrets:
  rabbitmqConnectionString: "amqp://guest:guest@rabbitmq.prod.svc.cluster.local:5672/"

env:
  jaegerEndpoint: "jaeger.tracing.svc.cluster.local:4317"
