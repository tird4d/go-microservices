services:

  order-service:
    build:
      context: .
      dockerfile: ./order_service/Dockerfile
    container_name: go-micro-order-service
    restart: always
    ports:
      - "8082:8082"
      - "2115:2112"  # Prometheus metrics
    env_file:
      - ./order_service/.env
    depends_on:
      - rabbitmq
      - product-service
      - jaeger
    networks:
      - microservices

  frontend-service:
    build:
      context: ./frontend_service
      dockerfile: Dockerfile
      target: development
    container_name: go-micro-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - microservices
  api-gateway:
    build:
      context: .
      dockerfile: ./api_gateway/Dockerfile
    container_name: go-micro-api-gateway
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./api_gateway/.env
    depends_on:
      - user-service
      - auth-service
      - product-service
    networks:
      - microservices

  user-service:
    build:
      context: .
      dockerfile: ./user_service/Dockerfile
    container_name: go-micro-user-service
    restart: always
    ports:
      - "50051:50051"
      - "2114:2112"   # Prometheus metrics (host:2114 → container:2112)
    volumes:
      - ./user_service:/app
    env_file:
      - ./user_service/.env
    depends_on:
      - mongo
    networks:
      - microservices

  auth-service:
    build:
      context: .
      dockerfile: ./auth_service/Dockerfile
    container_name: go-micro-auth-service
    restart: always
    ports:
      - "50052:50052"
      - "2112:2112"   # Prometheus metrics
    env_file:
      - ./auth_service/.env
    depends_on:
      - mongo
      - redis
    networks:
      - microservices

  product-service:
    build:
      context: .
      dockerfile: ./product_service/Dockerfile
    container_name: go-micro-product-service
    restart: always
    ports:
      - "50053:50053"
      - "2113:2112"   # Prometheus metrics (host:2113 → container:2112)
    env_file:
      - ./product_service/.env
    depends_on:
      - rabbitmq
    networks:
      - microservices

  mongo:
    image: mongo:6
    container_name: go-micro-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - microservices

  redis:
    image: redis:7
    container_name: go-micro-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - microservices

  email-service:
    build:
      context: .
      dockerfile: ./email_service/Dockerfile
    container_name: go-micro-email-service
    restart: always
    ports:
      - "2116:2112"  # Prometheus metrics
    env_file:
      - ./email_service/.env
    depends_on:
      - rabbitmq
      - jaeger
    networks:
      - microservices

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
    - microservices

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector
      - "14250:14250"  # gRPC
      - "6831:6831/udp"  # Jaeger agent
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - microservices

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: go-micro-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - microservices

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: go-micro-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    networks:
      - microservices

  grafana:
    image: grafana/grafana:11.6.1
    container_name: go-micro-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - microservices

volumes:
  mongo-data:
  grafana-data:

networks:
  microservices:
    driver: bridge